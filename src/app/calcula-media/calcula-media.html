<div class="container">

    <h1>Calcular a média de uma disciplina</h1>

    <form>

        <div class="campo">
            <label for="b1">1º Bimestre</label>
            <input type="number" id="b1" #b1>
        </div>

        <div class="campo">
            <label for="b2">2º Bimestre</label>
            <input type="number" id="b2" #b2>
        </div>

        <div class="campo">
            <label for="b3">3º Bimestre</label>
            <input type="number" id="b3" #b3>
        </div>

        <div class="campo">
            <label for="b4">4º Bimestre</label>
            <input type="number" id="b4" #b4>
        </div>

        <div class="campo">
            <label for="exame">Avaliação Final</label>
            <input type="number" id="exame" #exame>
        </div>

        <div class="botoes">

            <input type="button" value="Calcular Média Parcial"
                (click)="calcularMediaParcial(+b1.value, +b2.value, +b3.value, +b4.value)">

            <input type="button" value="Calcular Média Final" (click)="calcularMediaFinal(exame.value)">

        </div>

    </form>

    @if (mediaParcial !== undefined) {
    <div class="resultado">
        <p>Média Parcial: {{ mediaParcial.toFixed(1) }}</p>
    </div>
    }

    @if (mediaFinal !== undefined) {
    <div class="resultado">

        <p>Média Final: {{ mediaFinal.toFixed(1) }}</p>

        @if (mediaFinal >= 60) {
        <p class="aprovado">Aluno Aprovado</p>
        }

        @if (mediaFinal < 60) { <p class="reprovado">Aluno Reprovado</p>
            }

    </div>
    }

</div>
